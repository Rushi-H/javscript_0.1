<!-- this queryselector by class -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <nav class="block">
        <p class="paragraph"> Welcome to my website</p>
    </nav>
    <div class="block">
        <h4>
            Hey There, My name is
            <span id="username">Rushikesh </span>
        </h4>
        <p class="block" Here is a code for you</p>
        <pre><code>console.log('Hey There')</code></pre>
    </div>

    <script>
        const ml = document.getElementsByClassName("block")
        // ml.style.background = 'blue';

        for(let i = 0; i< ml.length; i++){
            // ml.item(i).style.background = 'yellow'
            ml.item(i).remove()
            console.log(ml.item(i));
            
        }        



    </script>

</body>

</html>
