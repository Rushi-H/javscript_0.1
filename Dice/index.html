<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dice Duel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Roll to Win!</h1>
        <div class="game-board">
            <div class="player">
                <p>Player 1</p>
                <img class="img1" src="https://api.dicebear.com/7.x/initials/svg?seed=6" alt="dice">
            </div>
            <div class="player">
                <p>Player 2</p>
                <img class="img2" src="https://api.dicebear.com/7.x/initials/svg?seed=6" alt="dice">
            </div>
        </div>
        <button id="roll-btn">Roll Dice</button>
    </div>
    <script src="index.js"></script>
</body>
</html>
